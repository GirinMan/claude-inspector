version: '3.8'

services:
  claude-inspector-proxy:
    build: .
    container_name: claude-inspector-proxy
    ports:
      - "9090:9090"  # HTTP proxy
      - "9091:9091"  # WebSocket
    volumes:
      - ./logs:/app/logs  # Mount logs directory for persistence
    command: >
      --target https://api.anthropic.com
      --enable-logging
    restart: unless-stopped

  # Alternative: AWS Bedrock proxy with logging
